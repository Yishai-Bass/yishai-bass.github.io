<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>OrderUp! - Mobile</title>
  <link rel="icon" type="image/png" href="cuppy_favicon.png">
  <link rel="apple-touch-icon" href="cuppy_favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="preload" href="cuppy.png" as="image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #000;
      font-family: 'Montserrat', sans-serif;
      color: #fff;
    }

    .page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0 20px 20px;
      box-sizing: border-box;
      text-align: center;
    }

    .top-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    .hero-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      margin-bottom: 24px;
    }

    .corner-image {
      width: 220px;
      max-width: 65vw;
      margin-top: -60px;
      margin-bottom: -110px;
      display: block;
    }

    .hero-title {
      font-weight: 900;
      font-size: 4rem;
      color: #fff;
      letter-spacing: -0.05em;
      margin: 0;
      line-height: 1;
    }

    .hero-slogan {
      font-weight: 700;
      font-size: 1.2rem;
      color: #fcdc8b;
      letter-spacing: -0.03em;
      margin: 6px 0 0;
      text-transform: lowercase;
      animation: sloganGlow 3s ease-in-out infinite;
    }

    .toggle-section {
      position: relative;
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 999px;
      padding: 4px;
      margin: 0 0 24px;
      width: 100%;
      max-width: 320px;
      box-sizing: border-box;
    }

    .toggle-slider {
      position: absolute;
      top: 4px;
      left: 4px;
      width: calc(50% - 4px);
      height: calc(100% - 8px);
      background: #fcdc8b;
      border-radius: 999px;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
      z-index: 0;
    }

    .toggle-slider.right {
      transform: translateX(100%);
    }

    .toggle-btn {
      flex: 1;
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      background: transparent;
      cursor: pointer;
      position: relative;
      z-index: 1;
      color: #000;
      outline: none;
      border-radius: 999px;
      white-space: nowrap;
    }

    .toggle-btn.active {
      font-weight: 700;
    }

    .hero-subtitle {
      font-weight: 400;
      font-size: 1.4rem;
      color: #fff;
      letter-spacing: -0.04em;
      margin: 0 0 14px;
    }

    .mode-blurb {
      font-weight: 400;
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.82);
      width: 100%;
      max-width: 360px;
      margin: 0;
      line-height: 1.6;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .mode-blurb.fade-out {
      opacity: 0;
      transform: translateY(10px);
    }

    .email-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }

    #email-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .email-section label {
      display: block;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 12px;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .email-section label.fade-out {
      opacity: 0;
      transform: translateY(-10px);
    }

    .email-section input[type="email"] {
      width: 100%;
      max-width: 260px;
      padding: 12px 14px;
      font-size: 16px;
      border: none;
      border-radius: 999px;
      outline: none;
      box-sizing: border-box;
      text-align: center;
    }

    .email-section button[type="submit"] {
      margin-top: 14px;
      width: 100%;
      max-width: 260px;
      padding: 12px 20px;
      font-size: 16px;
      background: #fcdc8b;
      color: #000;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      box-sizing: border-box;
    }

    .success-message,
    .error-message {
      margin-top: 14px;
      font-size: 14px;
      display: none;
      line-height: 1.5;
    }

    .success-message {
      color: #fcdc8b;
    }

    .error-message {
      color: #f87171;
    }

    @keyframes sloganGlow {
      0% {
        text-shadow: 0 0 10px rgba(252, 220, 139, 0.4);
      }

      50% {
        text-shadow: 0 0 20px rgba(252, 220, 139, 0.8);
      }

      100% {
        text-shadow: 0 0 10px rgba(252, 220, 139, 0.4);
      }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="top-section">
      <div class="hero-section">
        <img src="cuppy.png" alt="Cuppy" class="corner-image">
        <h1 class="hero-title">OrderUp!</h1>
        <p class="hero-slogan">ready when you are</p>
      </div>

      <div class="toggle-section">
        <div class="toggle-slider" id="toggle-slider"></div>
        <button class="toggle-btn active" id="coffee-lover" onclick="setMode('lover')">I drink coffee</button>
        <button class="toggle-btn" id="coffee-seller" onclick="setMode('seller')">I sell coffee</button>
      </div>

      <p class="hero-subtitle">coming soon...</p>

      <p class="mode-blurb" id="mode-blurb">
        OrderUp! is an app that makes ordering effortless: order seamlessly, earn rewards,
        skip the queue, order with friends and much more!
      </p>
    </div>

    <div class="email-section">
      <form id="email-form" action="https://formspree.io/f/xbdknqdv" method="POST">
        <label for="email" id="form-label">Join the waitlist!</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required>
        <input type="hidden" name="_subject" id="email-subject" value="Coffee lover wants to join the waitlist">
        <input type="hidden" name="message" id="email-message" value="A coffee lover signed up to join the waitlist">
        <input type="hidden" name="user_type" id="user-type" value="coffee_lover">
        <button type="submit">Submit</button>
      </form>

      <p class="success-message" id="success">Thank you!<br>We'll be in touch!</p>
      <p class="error-message" id="error">Something went wrong. Please try again.</p>
    </div>
  </div>

  <script>
    const form = document.getElementById('email-form');
    const successMsg = document.getElementById('success');
    const errorMsg = document.getElementById('error');
    const formLabel = document.getElementById('form-label');
    const emailSubject = document.getElementById('email-subject');
    const emailMessage = document.getElementById('email-message');
    const userType = document.getElementById('user-type');
    const loverBtn = document.getElementById('coffee-lover');
    const sellerBtn = document.getElementById('coffee-seller');
    const slider = document.getElementById('toggle-slider');
    const modeBlurb = document.getElementById('mode-blurb');

    function setMode(mode) {
      formLabel.classList.add('fade-out');
      modeBlurb.classList.add('fade-out');

      setTimeout(() => {
        if (mode === 'lover') {
          loverBtn.classList.add('active');
          sellerBtn.classList.remove('active');
          slider.classList.remove('right');
          formLabel.textContent = 'Join the waitlist!';
          modeBlurb.textContent = "OrderUp! is an app that makes ordering effortless: order seamlessly, earn rewards, skip the queue, order with friends and much more!";
          emailSubject.value = 'Coffee lover wants to join the waitlist';
          emailMessage.value = 'A coffee lover signed up to join the waitlist';
          userType.value = 'coffee_lover';
        } else {
          sellerBtn.classList.add('active');
          loverBtn.classList.remove('active');
          slider.classList.add('right');
          formLabel.textContent = 'Get in touch!';
          modeBlurb.textContent = "OrderUp! is an app that helps you grow your business effortlessly: reach new customers, gain powerful insights, and get more orders!";
          emailSubject.value = 'Coffee seller wants to get in touch';
          emailMessage.value = 'A coffee seller wants to get in touch';
          userType.value = 'coffee_seller';
        }

        formLabel.classList.remove('fade-out');
        modeBlurb.classList.remove('fade-out');
      }, 200);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      try {
        const response = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });

        if (response.ok) {
          form.style.display = 'none';
          successMsg.style.display = 'block';
          errorMsg.style.display = 'none';
        } else {
          errorMsg.style.display = 'block';
        }
      } catch (error) {
        errorMsg.style.display = 'block';
      }
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth > 768) {
        window.location.replace('index.html');
      }
    });
  </script>
</body>

</html>
