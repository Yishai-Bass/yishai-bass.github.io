<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>OrderUp!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      background: #000;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
      font-family: 'Montserrat', sans-serif;
    }
  </style>
  <script>
    function route() {
      const isMobile = window.innerWidth <= 768 || /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
      if (isMobile) {
        window.location.replace("mobile_view.html");
      } else {
        window.location.replace("web_view.html");
      }
    }
    // Route immediately
    route();
    // Also route on resize to handle orientation changes or desktop resizing
    window.addEventListener('resize', route);
  </script>
</head>

<body>
  <!-- Fallback if redirect fails or JS is slow -->
  <p>Loading OrderUp!...</p>
</body>

</html>
